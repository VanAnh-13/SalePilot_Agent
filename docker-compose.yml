services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-salepilot}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-salepilot}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-salepilot}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-salepilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salepilot}
      POSTGRES_DB: ${POSTGRES_DB:-salepilot}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/db/postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salepilot} -d ${POSTGRES_DB:-salepilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Auto-generated REST API over the PostgreSQL catalog / KB tables.
  postgrest:
    image: postgrest/postgrest:v12.2.3
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgresql://authenticator:${POSTGRES_PASSWORD:-salepilot}@postgres:5432/${POSTGRES_DB:-salepilot}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    # DB connection (DATABASE_URL / POSTGRES_DSN / MONGODB_URI) now comes from
    # .env → points at cloud (Neon Postgres + MongoDB Atlas). Only non-secret
    # runtime knobs are set here. To go back to local DBs, restore those vars.
    environment:
      CATALOG_BACKEND: postgres
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      CHROMA_PATH: ./data/chroma
    volumes:
      - ./backend/data:/app/data
    # Lets OPENAI_BASE_URL point at an OpenAI-compatible server on the host
    # (e.g. http://host.docker.internal:11434/v1 for local Ollama/vLLM/LM Studio).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
  pg_data:
